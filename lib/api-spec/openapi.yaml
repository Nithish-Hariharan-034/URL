openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: URL Shortener API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: urls
    description: URL management operations
  - name: analytics
    description: Analytics operations
  - name: dashboard
    description: Dashboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /urls:
    get:
      operationId: listUrls
      tags: [urls]
      summary: List all URLs for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of short URLs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShortUrl"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUrl
      tags: [urls]
      summary: Create a short URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UrlInput"
      responses:
        "201":
          description: Short URL created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortUrl"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Custom alias already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /urls/{id}:
    put:
      operationId: updateUrl
      tags: [urls]
      summary: Update a short URL destination
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UrlUpdate"
      responses:
        "200":
          description: URL updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortUrl"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: URL not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUrl
      tags: [urls]
      summary: Delete a short URL
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: URL deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: URL not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /urls/{id}/analytics:
    get:
      operationId: getUrlAnalytics
      tags: [analytics]
      summary: Get analytics for a specific URL
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsData"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: URL not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/{shortCode}:
    get:
      operationId: getPublicStats
      tags: [analytics]
      summary: Get public stats for a short URL
      parameters:
        - name: shortCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStats"
        "404":
          description: URL not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt

    AuthToken:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    RegisterInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    ShortUrl:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        originalUrl:
          type: string
        shortCode:
          type: string
        customAlias:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        totalClicks:
          type: integer
      required:
        - id
        - userId
        - originalUrl
        - shortCode
        - customAlias
        - expiresAt
        - createdAt
        - totalClicks

    UrlInput:
      type: object
      required:
        - originalUrl
      properties:
        originalUrl:
          type: string
          format: uri
        customAlias:
          type: string
        expiresAt:
          type: string
          format: date-time

    UrlUpdate:
      type: object
      required:
        - originalUrl
      properties:
        originalUrl:
          type: string
          format: uri
        expiresAt:
          type: ["string", "null"]
          format: date-time

    ClickRecord:
      type: object
      properties:
        id:
          type: integer
        timestamp:
          type: string
          format: date-time
        ipAddress:
          type: ["string", "null"]
        userAgent:
          type: ["string", "null"]
        browser:
          type: ["string", "null"]
        device:
          type: ["string", "null"]
      required:
        - id
        - timestamp
        - ipAddress
        - userAgent
        - browser
        - device

    DailyClick:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
      required:
        - date
        - count

    BreakdownItem:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
      required:
        - name
        - count

    AnalyticsData:
      type: object
      properties:
        totalClicks:
          type: integer
        lastVisited:
          type: ["string", "null"]
          format: date-time
        recentClicks:
          type: array
          items:
            $ref: "#/components/schemas/ClickRecord"
        dailyClicks:
          type: array
          items:
            $ref: "#/components/schemas/DailyClick"
        browserBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/BreakdownItem"
        deviceBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/BreakdownItem"
        shortUrl:
          $ref: "#/components/schemas/ShortUrl"
      required:
        - totalClicks
        - lastVisited
        - recentClicks
        - dailyClicks
        - browserBreakdown
        - deviceBreakdown
        - shortUrl

    PublicStats:
      type: object
      properties:
        shortCode:
          type: string
        originalUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        totalClicks:
          type: integer
        lastVisited:
          type: ["string", "null"]
          format: date-time
        dailyClicks:
          type: array
          items:
            $ref: "#/components/schemas/DailyClick"
        browserBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/BreakdownItem"
        deviceBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/BreakdownItem"
      required:
        - shortCode
        - originalUrl
        - createdAt
        - expiresAt
        - totalClicks
        - lastVisited
        - dailyClicks
        - browserBreakdown
        - deviceBreakdown

    DashboardStats:
      type: object
      properties:
        totalUrls:
          type: integer
        totalClicks:
          type: integer
        activeUrls:
          type: integer
        topUrl:
          $ref: "#/components/schemas/ShortUrl"
      required:
        - totalUrls
        - totalClicks
        - activeUrls
